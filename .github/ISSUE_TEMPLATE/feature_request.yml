name: Feature request
description: Propose a new feature or a meaningful enhancement.
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Please describe the problem you're trying to solve
        and how you expect VedMint CRM to behave. See [CONTRIBUTING.md](./CONTRIBUTING.md).

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow or pain point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried?

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this request.
          required: true
